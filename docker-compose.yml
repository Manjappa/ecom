services:
  postgres:
    image: postgres:16
    container_name: ecom-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ecom
      POSTGRES_PASSWORD: ecom
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

volumes:
  postgres_data:

